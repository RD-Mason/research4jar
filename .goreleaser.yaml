version: 2

project_name: research4jar

# The JVM indexer distribution is platform-independent; build it once and
# bundle it into every archive so releases are self-contained (Java 8+ is
# still required at runtime). Deprecated by M6: the pure-Java CLI replaces
# these archives once the migration completes.
before:
  hooks:
    - ./gradlew :core:installDist

builds:
  - id: research4jar
    dir: querier
    main: ./cmd/research4jar
    # Path inside the archive mirrors the `make install` layout so the
    # querier's indexer auto-location (bin/../libexec) works untouched.
    binary: bin/research4jar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: research4jar
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      - src: core/build/install/research4jar-index/lib/**
        dst: libexec/research4jar-index/lib
      - src: core/build/install/research4jar-index/bin/**
        dst: libexec/research4jar-index/bin
        info:
          mode: 0755

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  footer: |
    ## Install

    Download the archive for your platform, unpack it, and put `bin/` on your PATH.
    The JVM indexer is bundled under `libexec/` and found automatically; running
    `research4jar index` requires Java 11+ on the machine.
