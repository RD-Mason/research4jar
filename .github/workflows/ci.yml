name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  indexer:
    name: Indexer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Test indexer
        shell: bash
        run: ./gradlew :indexer:check
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
      - name: Smoke test indexer on Java 11
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmd //c indexer\\build\\install\\research4jar-index\\bin\\research4jar-index.bat --help
          else
            indexer/build/install/research4jar-index/bin/research4jar-index --help
          fi

  querier:
    name: Querier (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: querier/go.mod
          cache-dependency-path: querier/go.sum
      - name: Build
        working-directory: querier
        run: go build ./...
      - name: Test
        working-directory: querier
        run: go test ./...
      - name: Vet
        working-directory: querier
        run: go vet ./...

  e2e:
    name: E2E (cross-language contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: actions/setup-go@v6
        with:
          go-version-file: querier/go.mod
          cache-dependency-path: querier/go.sum
      - name: Run e2e (indexer + querier through real SQLite)
        shell: bash
        run: make e2e
