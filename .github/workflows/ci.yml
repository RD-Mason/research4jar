name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Test all modules
        shell: bash
        run: ./gradlew check
      - name: Build fat jar
        shell: bash
        run: ./gradlew :cli:shadowJar
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
      - name: Smoke test the CLI on Java 8
        shell: bash
        run: java -jar cli/build/libs/research4jar-cli-*.jar --help || java -jar cli/build/libs/research4jar-cli-*.jar help

  e2e:
    name: E2E (JVM CLI end to end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run e2e
        shell: bash
        run: make e2e

  maven-plugin-smoke:
    name: Maven plugin smoke (real mvn run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Publish plugin to mavenLocal
        run: ./gradlew :core:publishToMavenLocal :maven-plugin:publishToMavenLocal
      - name: Run research4jar:index in the fixture project
        working-directory: tests/fixtures/maven-plugin-smoke
        run: mvn -q -B dev.research4jar:research4jar-maven-plugin:0.1.0:index
      - name: Assert index artifacts
        working-directory: tests/fixtures/maven-plugin-smoke
        run: |
          test -f .research4jar/project.json
          test -f .research4jar/dependencies.json
          python3 - <<'PY'
          import json
          pointer = json.load(open(".research4jar/project.json"))
          assert pointer["coverage"]["jars_indexed"] >= 1, pointer
          graph = json.load(open(".research4jar/dependencies.json"))
          assert graph["build_tool"] == "maven", graph
          assert any(a["artifact"] == "org.slf4j:slf4j-api" for a in graph["artifacts"]), graph
          PY
