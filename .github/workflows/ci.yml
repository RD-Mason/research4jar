name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Test all modules
        shell: bash
        run: ./gradlew check
      - name: Build fat jar
        shell: bash
        run: ./gradlew :cli:shadowJar
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
      - name: Smoke test the CLI on Java 8
        shell: bash
        run: java -jar cli/build/libs/research4jar-cli-*.jar --help || java -jar cli/build/libs/research4jar-cli-*.jar help

  e2e:
    name: E2E (JVM CLI end to end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run e2e
        shell: bash
        run: make e2e
